# Cấu hình kết nối Database (XAMPP MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/student_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate tự tạo / cập nhật bảng theo Entity (tiện cho học tập)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Server chạy cổng 8080
server.port=8080

# JWT - khóa bí mật để ký token (phải >= 32 ký tự)
jwt.secret=mySecretKey123456789012345678901234567890AbCdEfGhIj
jwt.expiration=86400000